# =============================================================================
# GitHub Actions — Deploy to GitHub Pages
#
# Triggers: push to main, or manual workflow_dispatch
# Deploys the static site (HTML/CSS/JS) with no build step required.
#
# After pushing, enable GitHub Pages in your repo:
#   Settings → Pages → Source: "GitHub Actions"
# =============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs for the same branch
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire project root — no build step needed
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
